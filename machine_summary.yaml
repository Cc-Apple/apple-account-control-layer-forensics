ttp_framing_update_lotl_platform_state:
  status: "public_non_attribution_framing_update"
  date_added: "2026-06"
  purpose: >
    Clarify the Shadow Cloud working hypothesis as a LOTL-like Apple
    platform-state / trust-state abuse hypothesis, while keeping APT42,
    APT32, LIMINAL-style, mercenary spyware, and LOTL references as
    comparison points only.

  primary_framing:
    hypothesis_name: "Shadow Cloud"
    mechanism: "LOTL-like Apple platform-state / trust-state abuse"
    short_formula: "Not living off tools. Living off Apple platform state."
    trace_location: "not in payloads, but in Apple ecosystem seams"

  hypothesis_stack:
    shadow_cloud:
      role: "working hypothesis name"
      attribution: "not asserted"

    lotl_like_apple_platform_state_abuse:
      role: "proposed TTP mechanism"
      description: >
        A mechanism-level framing in which normal-looking Apple platform states,
        trust states, restriction states, backup states, telecom states, and
        evidence-preservation behavior may become the anomaly surface.
      attribution: "not asserted"

    apt42_style_acms:
      role: "comparison reference"
      meaning: "account / cloud / mobile-surveillance doctrine"
      attribution: "not asserted"

    apt32_style_historical_transfer:
      role: "secondary comparison reference"
      meaning: "historical TTP transfer / old-doctrine leakage / operational-history comparison"
      attribution: "not asserted"

    liminal_style_telecom_proximity:
      role: "tertiary comparison reference"
      meaning: "telecom / proximity / condition-linked state comparison"
      attribution: "not asserted"

  apple_platform_state_surfaces:
    - "Apple ID trust state"
    - "iCloud trust state"
    - "trusted-device behavior"
    - "usageClientId / usage-state transitions"
    - "ScreenTime"
    - "ManagedSettings"
    - "FamilyControls"
    - "MDMStatus:false with management-adjacent daemon activity"
    - "Manifest.db / Manifest.plist / Status.plist"
    - "backup-ledger behavior"
    - "RTCR / RTCReporting"
    - "CommCenter"
    - "Baseband"
    - "SIM / OTP / financial device-trust context"
    - "BSSID / RSSI proximity context"
    - "storage pressure"
    - "backup failure"
    - "screenshot / recording difficulty"
    - "evidence-preservation interference"

  distinction_from_traditional_lotl:
    traditional_lotl:
      summary: "uses legitimate tools, valid accounts, native utilities, or normal administrative workflows"
      examples:
        - "PowerShell"
        - "WMI"
        - "RDP"
        - "PsExec"
        - "SSH"
        - "VPN access"
        - "cloud console activity"
        - "valid accounts"
        - "native administrative tools"

    shadow_cloud_platform_state:
      summary: "may use or distort legitimate Apple platform state"
      examples:
        - "Apple ID / iCloud trust state"
        - "ScreenTime / ManagedSettings state"
        - "backup-ledger state"
        - "Manifest.db behavior"
        - "CommCenter / Baseband / SIM / OTP context"
        - "usageClientId continuity"
        - "evidence-preservation behavior"

  comparison_scores:
    old_framing_without_lotl:
      score: 72
      summary: >
        Useful but overly actor-adjacent. APT42/APT32 comparison helped explain
        account/cloud/mobile surveillance and historical TTP transfer, but did
        not fully explain payload absence, Apple platform-state anomalies, or
        evidence-preservation interference.

    updated_framing_with_lotl_like_platform_state:
      score: 86
      summary: >
        Stronger mechanism-level framing. Explains why traces may appear in
        normal-looking Apple ecosystem states rather than malware payloads,
        and reduces attribution risk by focusing on platform-state abuse
        instead of named actors.

    score_delta:
      value: 14
      interpretation: >
        LOTL-like Apple platform-state framing significantly improves coherence
        while preserving APT42 and APT32 as comparison references.

  key_review_questions:
    - "Can Manifest.db / backup-ledger behavior be reproduced as normal iOS / iMazing backup behavior?"
    - "Can MDMStatus:false normally coexist with repeated management-adjacent daemon activity in the observed pattern?"
    - "Can usageClientId / usage-state transitions be explained by normal account/device behavior?"
    - "Can ScreenTime / ManagedSettings / restriction-layer behavior be explained by defaults, user settings, Family Sharing, or normal account state?"
    - "Can CommCenter / Baseband / SIM / OTP context be explained as independent normal events?"
    - "Can BSSID / RSSI proximity anchors be explained as ordinary Wi-Fi roaming artifacts?"
    - "Can evidence-preservation failures be explained by storage, local PC issues, app behavior, or backup-tool behavior?"
    - "Can the alpha / beta phase shift be explained by observer-side changes, collection bias, iOS updates, or backup-method changes?"
    - "Does the cross-device structure remain after normal explanations are applied?"
    - "If normal explanations fail, does the remaining pattern resemble LOTL-like Apple platform-state abuse?"

  non_attribution_boundary:
    does_not_claim:
      - "confirmed malware"
      - "confirmed payload"
      - "confirmed C2"
      - "confirmed exploit chain"
      - "confirmed spyware"
      - "confirmed MDM enrollment"
      - "APT42 attribution"
      - "APT32 attribution"
      - "LIMINAL PANDA attribution"
      - "state attribution"
      - "Apple attribution"
      - "iMazing attribution"
      - "telecom-provider attribution"
      - "attacker identity"

  linked_documents:
    - "README.md"
    - "SUMMARY_ONE_PAGE.md"
    - "docs/ttp_framing_addendum_lotl_platform_state.md"
    - "reports/06_ttp_comparison_apt32_apt42_liminal.md"
    - "reports/07_limitations_and_non_attribution.md"

  practical_reviewer_takeaway: >
    The central question is not which APT group did this. The central question is
    whether normal Apple / iOS / iCloud / iMazing behavior can explain a long-term,
    cross-device structure in which trust state, restriction state, backup state,
    telecom state, and evidence-preservation behavior appear to cluster at the same seams.
