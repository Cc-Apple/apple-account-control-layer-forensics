ttp_framing_update_lotl_platform_state:
status: "public_non_attribution_framing_update"
date_added: "2026-06"
purpose: >
Clarify the Shadow Cloud working hypothesis as a mobile-native LOTL-like
Apple platform-state / trust-state anomaly hypothesis, while keeping public
TTP reports, historical TTP material, telecom / proximity concepts,
commercial spyware models, Microsoft app surfaces, and LOTL references as
comparison points or future review surfaces only.

primary_framing:
hypothesis_name: "Shadow Cloud"
mechanism: "LOTL-like Apple platform-state / trust-state anomaly"
maximum_working_hypothesis: "Mobile-native LOTL-like Apple platform-state anomaly"
short_formula: "Not living off tools. Living off Apple platform state."
backup_layer_formula: "Living off Apple backup state."
trace_location: "not in payloads, but in Apple ecosystem seams"

hypothesis_stack:
shadow_cloud:
role: "working hypothesis name"
attribution: "not asserted"

```
mobile_native_lotl_like_apple_platform_state_anomaly:
  role: "maximum current mechanism-level hypothesis"
  description: >
    A mobile-native adaptation of Living-off-the-Land logic in which
    legitimate mobile apps, accounts, cloud identity, calendar, document,
    policy, backup, telecom, and evidence-preservation states may become
    the observable control surface.
  attribution: "not asserted"

lotl_like_apple_platform_state_anomaly:
  role: "mechanism-level framing"
  description: >
    A mechanism-level framing in which normal-looking Apple platform states,
    trust states, restriction states, backup states, telecom states, and
    evidence-preservation behavior may become the anomaly surface.
  attribution: "not asserted"

backup_ledger_seam:
  role: "focused backup-layer branch"
  description: >
    Manifest.db / backup-ledger abnormality may represent a byproduct or
    observable evidence-preservation seam within the broader mobile-native
    LOTL-like Apple platform-state anomaly model.
  attribution: "not asserted"

outlook_microsoft_surface:
  role: "possible entry / state surface candidate for future review"
  description: >
    Outlook / Microsoft account-cloud-calendar-document surfaces may be
    relevant as future review surfaces because they can involve legitimate
    account, calendar, meeting, attachment, token, document-provider,
    FileProvider, and policy state. They are not asserted as causes.
  attribution: "not asserted"
  public_proof_status: "not established"

account_cloud_mobile_surveillance_comparison:
  role: "public comparison reference"
  meaning: "account / cloud / mobile-surveillance doctrine"
  attribution: "not asserted"

historical_ttp_comparison:
  role: "secondary operational-history comparison"
  meaning: "historical TTP comparison / old-doctrine leakage / operational-history comparison"
  attribution: "not asserted"

telecom_proximity_comparison:
  role: "tertiary condition / context comparison"
  meaning: "telecom / proximity / condition-linked state comparison"
  attribution: "not asserted"
```

