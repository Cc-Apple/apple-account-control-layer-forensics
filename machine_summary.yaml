backup_ledger_seam_mobile_lotl:
status: "public_non_attribution_backup_layer_addendum"
document: "docs/backup_ledger_seam_mobile_lotl.md"

framing:
hypothesis_name: "Backup-ledger seam in mobile LOTL-like platform-state anomaly"
short_formula: "Living off Apple backup state"
relationship_to_shadow_cloud: >
This is a focused backup-layer branch of the broader Shadow Cloud working
hypothesis. It frames Manifest.db / backup-ledger abnormality as a possible
evidence-preservation seam within a mobile LOTL-like Apple platform-state
anomaly.
relationship_to_maximum_hypothesis: >
Under the maximum working hypothesis, Manifest.db is not treated as the
root cause. Manifest.db / backup-ledger abnormality is treated as a
byproduct or observable evidence-preservation seam.
attribution: "not asserted"

core_interpretation:
imazing_role: "acquisition surface"
apple_backup_state_role: "review surface"
manifest_db_role: "observable backup-ledger seam"
summary: >
iMazing is not presented as the cause. The hypothesis is that abnormal
Apple backup state, trust state, keybag/encryption state, pairing state,
storage-pressure state, or evidence-preservation state may become observable
through the iMazing / iOS backup workflow as Manifest.db / backup-ledger
abnormality.

observed_concerns:
- "Manifest.db not normally openable as SQLite"
- "SQLite-level failure such as file is not a database"
- "expected SQLite header absent in reviewed raw samples"
- "iMazing success / backend artifact mismatch"
- "multiple preserved backup generations"
- "possible RTCR / Manifest.plist / Status.plist relationship"
- "evidence-preservation relevance"

normal_explanation_candidates:
- "encrypted backup / keybag behavior"
- "iMazing implementation or display behavior"
- "partial or interrupted backup"
- "local PC / USB / file lock / security software"
- "storage pressure / low free space"
- "ordinary iOS / iMazing backup bug"
- "Microsoft app residue / Outlook calendar residue if preserved artifacts support that review path"

score_assessment:
manifest_db_alone: 74
manifest_db_plus_multiple_backup_generations: 80
manifest_db_plus_imazing_success_backend_mismatch: 82
manifest_db_plus_rtcr_status_manifest_correlation: 84
manifest_db_plus_full_shadow_cloud_structure: 86
conservative_public_addendum_score: 82
score_meaning: >
This is not an attack probability score. It means the backup-ledger seam
hypothesis explains the observed structure better than isolated normal
explanations, while still requiring qualified artifact-level review.

white_explanation_pressure:
summary: >
A single normal explanation may explain one artifact. The difficulty is
explaining repeated Manifest.db abnormality, expected SQLite header absence,
SQLite file-is-not-a-database errors, multiple backup generations, iMazing
success/backend mismatch, RTCR / Status.plist / Manifest.plist relationships,
ScreenTime / ManagedSettings signals, MDMStatus:false daemon repetition,
CommCenter / Baseband context, usageClientId transitions, storage pressure,
evidence-preservation difficulty, and possible Outlook / Microsoft review
surface relevance together.

strengthening_conditions:
- "Manifest.db repeatedly not valid SQLite after proper handling"
- "expected SQLite header absent in raw reviewed samples"
- "issue appears across multiple preserved backup generations"
- "iMazing success state does not match backend artifact reviewability"
- "Status.plist / Manifest.plist / RTCR indicate meaningful backup state despite Manifest.db abnormality"
- "control devices under the same acquisition environment produce normal Manifest.db"
- "issue correlates with ScreenTime / ManagedSettings / MDMStatus:false / daemon repetition / CommCenter / evidence-preservation events"
- "encrypted versus unencrypted backup comparisons do not fully explain the issue"
- "Outlook / Microsoft traces, if reviewed later, appear in preserved artifacts during key windows and correlate with account-cloud-calendar-document state rather than ordinary residue"

weakening_conditions:
- "Manifest.db opens normally as SQLite after proper decryption and handling"
- "observed error is expected under ordinary encrypted backup conditions"
- "clean control devices reproduce the same Manifest.db behavior under the same conditions"
- "Status.plist clearly indicates partial or failed backup state"
- "iMazing documentation or reproducible testing fully explains the observed state"
- "Windows / USB / antivirus / file-lock conditions reproduce the same artifact pattern"
- "low storage alone reproduces the observed backup-ledger behavior"
- "issue does not correlate with broader trust-state, restriction-state, daemon-layer, telecom, or evidence-preservation pattern"
- "Outlook / Microsoft traces, if reviewed later, are ordinary residue and do not correlate with the broader structure"

