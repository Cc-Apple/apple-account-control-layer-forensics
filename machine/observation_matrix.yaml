updated_shadow_cloud_framing:
  status: public_non_attribution_framing_update
  primary_hypothesis: Shadow Cloud
  recommended_framing: LOTL-like Apple platform-state / trust-state abuse
  short_formula: "Not living off tools. Living off Apple platform state."
  trace_location: "not in payloads, but in Apple ecosystem seams"
  relevance_to_this_matrix: >
    This matrix should be interpreted as a platform-state and restriction-state
    review matrix. The listed observations are not treated as standalone proof.
    They are review targets for determining whether normal Apple / iOS behavior
    can explain visible-management absence, internal restriction structures,
    support-window timing, FileProvider/iCloud state mismatch, storage pressure,
    and later restriction UI evidence.
  attribution: not_asserted

observations:
  visible_management_absence:
    description: "Ordinary visible management indicators were not observed in reviewed public-summary artifacts."
    dates:
      - "2026-03-03"
      - "2026-03-04"
      - "2026-03-05"
    indicators:
      mdm_status: false
      is_supervised: false
      post_setup_profile_was_installed: false
      mc_profile_events: empty
      visible_payload_manifest: empty
    interpretation:
      normal:
        - "No ordinary visible MDM / supervision / configuration profile was active in reviewed artifacts."
      anomalous:
        - "Later restriction UI evidence requires explanation without visible MDM / supervision / profile indicators."
        - "Visible-management absence becomes more relevant when aligned with ManagedSettings / DMD recomputation and later UI evidence."
    confidence: high
    lotl_like_platform_state_relevance: high
    proves:
      classic_mdm: false
      malware: false
      attribution: false

